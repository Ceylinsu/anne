<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anne AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* Başlat butonu katmanı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999; color: white;
        }
        button {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: #ff4d6d; border: none; border-radius: 50px; color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startButton">DENEYİMİ BAŞLAT</button>
        <p>Butona basın ve kamerayı anne fotoğrafına tutun.</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets5.mind; autoStart: true; uiLoading: no;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="anneVideo" src="./anne.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#anneVideo" width="1" height="1.4" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const video = document.querySelector("#anneVideo");

        // Kullanıcı etkileşimi olmadan video sesli başlayamaz
        startButton.addEventListener('click', () => {
            overlay.style.display = "none";
            video.play();
            video.pause(); // Sadece yetkiyi alıyoruz, resim bulunca başlayacak
        });

        const target = document.querySelector('[mindar-image-target]');
        target.addEventListener("targetFound", () => { video.play(); });
        target.addEventListener("targetLost", () => { video.pause(); });
    </script>
</body>
</html>
